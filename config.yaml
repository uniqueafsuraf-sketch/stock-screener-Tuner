# Universe: both_ourbit = US stocks + ETFs + watchlist + Ourbit tokenized stocks (stocks only, no crypto)
universe: both_ourbit

# Extra symbols merged into universe
watchlist:
  - DRAM
  - SMH
  - SOXX
  - AAPL
  - MSFT
  - NVDA
  - AMZN
  - GOOGL
  - META
  - TSLA
  - AMD
  - NFLX
  - JPM
  - BAC
  - XOM
  - CVX
  - UNH
  - LLY
  - AVGO
  - COST
  - WMT
  - DIS
  - INTC
  - CRM
  - ORCL
  - QCOM
  - MU
  - PLTR
  - SOFI
  - COIN
  - PYPL
  - UBER

# Ourbit tokenized US stocks only (*ON pairs) — auto-sync new listings
ourbit:
  sync_interval_sec: 900

# STOCK Act politician disclosures (Senate + House)
congress:
  sync_interval_sec: 1800
  lookback_days: 180
  min_buy_usd: 5000

# How many trading days of history to pull
lookback_days: 120

# Volume spike: today vs 20-day average
volume_spike_ratio: 1.8

# Sell-off: single-day drop % (negative number, e.g. -3 = down 3%)
selloff_min_pct: -2.5
selloff_volume_ratio: 1.3

# Trendline: price within this % of computed support/resistance line
trendline_proximity_pct: 1.5
# Swing points used to build trendlines (higher = smoother, fewer touches)
swing_window: 5

# Minimum average daily dollar volume (price * avg vol) to filter illiquid names
min_avg_dollar_volume: 50_000_000

# RSI for oversold bounce context on sell-offs
rsi_period: 14
rsi_oversold: 35

# News & chart links (fetched after scan)
news:
  max_headlines: 4        # verified headlines per stock (newest first)
  max_age_hours: 48       # drop older headlines from wire + stock rows
  require_symbol_mention: true
  wire_fetch_for: all     # all scanned symbols | opportunities (faster)
  wire_max_total: 150     # max items in News wire panel
  wire_poll_sec: 90       # browser live news refresh
  workers: 12

# Unusual activity scanner
unusual:
  min_score: 25           # minimum unusual score to list

# Live raw quotes (price / change / volume) — updates every second
live:
  enabled: true
  interval_sec: 0.5
  poll_ms: 400          # browser poll /api/live (dashboard)
  market_poll_ms: 4000  # tape rebuild only when rankings change
  full_scan_interval_sec: 300   # signals, trendlines, news refresh

# Proprietary edge engine
edge:
  gap_min_pct: 1.5              # gap scanner threshold
