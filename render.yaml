# Render.com — free HTTPS website (stockstunerstation.onrender.com)
# Dashboard: https://dashboard.render.com

services:
  - type: web
    name: stockstunerstation
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --graceful-timeout 30
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: STS_HOST
        value: "0.0.0.0"
      - key: STS_PUBLIC_URL
        value: "https://stock-screener-tuner-1.onrender.com"
      - key: WEB_CONCURRENCY
        value: "1"
